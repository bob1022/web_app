<!DOCTYPE html>
<html>
<head>
    <title>Travel Time Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}?v=3">
</head>
<body>
   <h1 style="margin: 0 0 10px 0;">
        Travel Time Calculator
    </h1>

    <p style="margin: 0;">
        Use in Conjunction with Stellarium
    </p>

   <form method="post">

    <div class="form-row">
    <label for="destination">Destination:</label>
    <input type="text" name="destination" id="destination" value="{{ destination if destination else '' }}">
</div>

    <div class="form-row">
        <label for="distance">Distance:</label>
        <input type="text" name="distance" id="distance" value="{{ user_distance if user_distance else '' }}">
    </div>

    <div class="form-row">
        <label for="unit">Select Unit:</label>
        <select name="unit" id="unit">
            <option value="km">Kilometers (km)</option>
            <option value="au">Astronomical Units (AU)</option>
            <option value="ly">Light-Years (LY)</option>
        </select>
    </div>

    <div class="form-row">
        <label for="spacecraft">Select Spacecraft:</label>
        <select name="spacecraft" id="spacecraft">
            <option value="Apollo 10">Apollo 10 (11.08 km/s)</option>
            <option value="Voyager 1">Voyager 1 (17.0 km/s)</option>
            <option value="Voyager 2">Voyager 2 (15.4 km/s)</option>
            <option value="New Horizons">New Horizons (16.26 km/s)</option>
            <option value="Parker Solar Probe">Parker Solar Probe (192 km/s)</option>
            <option value="JWST">JWST (0.6 km/s)</option>
            <option value="10% Speed of Light">10% Speed of Light (29,979 km/s)</option>
        </select>
    </div>
    <br>
    <button type="submit">Calculate</button>

</form>

    {% if error %}
        <h3 style="color:red;">{{ error }}</h3>
    {% endif %}

    {% if days %}
<div class="result-box">

   <h2>Travel Time to:</h2>

<p style="font-size: 25px; font-weight: bold;">
    {{ destination }}
</p>

<p>Spacecraft: {{ spacecraft }} at {{ speed }} km/s</p>
<p>Distance: {{ distance }}</p>
<p>Days: {{ days }}</p>
<p>Years: {{ years }}</p>

</div>
{% endif %}

    <br>
    <a href="/">Back to Dashboard</a>

</body>
</html>
