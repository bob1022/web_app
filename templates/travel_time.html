<!DOCTYPE html>
<html>
<head>
    <title>Travel Time Calculator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}?v=3">
</head>
<body>
    <h1>Travel Time Calculator<br>
        Use in Conjuction with Stellarium
    </h1>

   <form method="post">

    <div class="form-row">
        <label for="destination">Destination:</label>
        <input type="text" name="destination" id="destination">
    </div>

    <div class="form-row">
        <label for="distance">Distance:</label>
        <input type="text" name="distance" id="distance">
    </div>

    <div class="form-row">
        <label for="unit">Select Unit:</label>
        <select name="unit" id="unit">
            <option value="km">Kilometers (km)</option>
            <option value="au">Astronomical Units (AU)</option>
            <option value="ly">Light-Years (LY)</option>
        </select>
    </div>

    <div class="form-row">
        <label for="speed">Select Spacecraft:</label>
        <select name="speed" id="speed">
            <option value="11.08">Apollo 10 (11.08 km/s)</option>
            <option value="15.4">Voyager 2 (15.4 km/s)</option>
            <option value="192">Parker Solar Probe (192 km/s)</option>
            <option value="29979">10% Light Speed (29,979 km/s)</option>
        </select>
    </div>

    <br>
    <button type="submit">Calculate</button>

</form>

    {% if error %}
        <h3 style="color:red;">{{ error }}</h3>
    {% endif %}

    {% if days %}
<div class="result-box">

    <h2>Travel Time to:</h2>

    <p style="font-size: 25px; font-weight: bold;">
        {{ destination }}
    </p>

    <p>Days: {{ days }}</p>
    <p>Years: {{ years }}</p>

</div>
{% endif %}

    <br>
    <a href="/">Back to Dashboard</a>

</body>
</html>
